## Nginx configuration for Hawk Vision Strategies
## Serves the Vite SPA and proxies Supabase API requests to Kong.
##
## Place this in /etc/nginx/sites-available/hawk and symlink to
## /etc/nginx/sites-enabled/hawk, then: sudo nginx -t && sudo systemctl reload nginx
##
## After DNS is pointed, add SSL with:
##   sudo certbot --nginx -d your-domain.com

server {
    listen 80;
    server_name _;          # Replace _ with your domain, e.g. hawk.example.com

    # ── Frontend SPA ──────────────────────────────────────────
    root /var/www/hawk/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── Supabase API proxy (Kong gateway) ─────────────────────
    # The supabase-js client calls these paths

    location /auth/v1/ {
        proxy_pass http://127.0.0.1:8000/auth/v1/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
    }

    location /rest/v1/ {
        proxy_pass http://127.0.0.1:8000/rest/v1/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /storage/v1/ {
        proxy_pass http://127.0.0.1:8000/storage/v1/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 50M;
    }

    # ── Security headers ──────────────────────────────────────
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
}
